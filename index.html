<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AB Test Quick Metrics</title>
  <!-- Tableau Extensions API
       Online/Cloud: loaded from CDN (works in any browser)
       Desktop:      falls back to the local file in the same folder     -->
  <script src="https://extensionsgallery.tableau.com/resources/tableau.extensions.1.latest.js"
          onerror="(function(){var s=document.createElement('script');s.src='tableau.extensions.1.latest.js';document.head.appendChild(s);})()">
  </script>
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ──────────────────────────────────────────── */
    html, body {
      width: 350px;
      height: 530px;
      overflow: hidden;
      background: #f0f4f8;
      color: #1a2535;
      font-family: 'Avenir Next', 'Avenir', -apple-system, 'Segoe UI', Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 530px;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────── */
    .hdr {
      background: #162032;
      padding: 11px 14px 10px;
      flex-shrink: 0;
    }
    .hdr-test {
      font-size: 12px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }
    .hdr-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .hdr-variants {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hdr-variants .ctrl { color: rgba(255,255,255,0.55); font-weight: 600; }
    .hdr-variants .arrow { color: rgba(255,255,255,0.25); }
    .hdr-variants .test { color: #22d8d2; font-weight: 600; }
    .hdr-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hdr-chips { display: flex; gap: 3px; }
    .hdr-chip {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 3px;
    }
    .chip-ios     { background: rgba(59,130,246,0.2);  color: #93c5fd; }
    .chip-android { background: rgba(74,222,128,0.2);  color: #86efac; }
    .chip-web     { background: rgba(251,146,60,0.2);  color: #fdba74; }
    .chip-all     { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .hdr-n {
      font-size: 9.5px;
      color: rgba(255,255,255,0.35);
    }
    .hdr-n strong { color: rgba(255,255,255,0.6); font-weight: 600; }

    /* ── Tabs (multiple param names) ───────────────────── */
    .tabs {
      display: flex;
      background: #1e2e44;
      padding: 0 14px;
      overflow-x: auto;
      flex-shrink: 0;
      border-bottom: 1px solid #253548;
    }
    .tabs::-webkit-scrollbar { height: 0; }
    .tab {
      padding: 6px 10px 5px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      letter-spacing: 0.01em;
      transition: color 0.12s;
      user-select: none;
    }
    .tab:hover { color: rgba(255,255,255,0.65); }
    .tab.active { color: #22d8d2; border-bottom-color: #22d8d2; }

    /* ── Scrollable content ────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: #c8d4e0; border-radius: 2px; }

    /* ── Section divider ───────────────────────────────── */
    .section-sep {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 0 2px;
    }
    .section-sep-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8fa3b8;
      white-space: nowrap;
    }
    .section-sep-line {
      flex: 1;
      height: 1px;
      background: #dce6ef;
    }

    /* ── Alert ─────────────────────────────────────────── */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 6px 9px;
      border-radius: 5px;
      background: #fff8ec;
      border: 1px solid #f5d98a;
      font-size: 10px;
      color: #92600a;
      line-height: 1.45;
    }
    .alert-icon { flex-shrink: 0; margin-top: 1px; }

    /* ── Metric Card ───────────────────────────────────── */
    .card {
      background: #ffffff;
      border: 1px solid #dce6ef;
      border-radius: 7px;
      padding: 9px 11px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.12s;
    }
    /* Left accent stripe by significance */
    .card.sig  { border-left: 3px solid #22d8d2; }
    .card.bord { border-left: 3px solid #f59e0b; }
    .card.ns   { border-left: 3px solid #94a3b8; }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 11px;
      font-weight: 700;
      color: #1a2535;
      letter-spacing: 0.01em;
    }
    .card-vals {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
    }
    .card-ctrl {
      font-size: 10px;
      color: #8fa3b8;
      font-variant-numeric: tabular-nums;
    }
    .card-arrow {
      font-size: 9px;
      color: #c4d0dc;
    }
    .card-test {
      font-size: 10px;
      font-weight: 600;
      color: #1a2535;
      font-variant-numeric: tabular-nums;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .card-delta {
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }
    .delta-pos { color: #2a7a72; }
    .delta-neg { color: #b85c58; }
    .delta-nil { color: #64748b; }

    .sig-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .sig-badge.sig  { background: #e0faf8; color: #0c8c85; }
    .sig-badge.bord { background: #fef3c7; color: #92600a; }
    .sig-badge.ns   { background: #e2e8f0; color: #475569; }
    .sig-badge.na   { background: #edf2f7; color: #b0bec8; }

    /* ── Empty / Loading / Error ───────────────────────── */
    .state-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 28px 24px;
      text-align: center;
    }
    .state-icon { color: #c4d0dc; }
    .state-title {
      font-size: 13px;
      font-weight: 700;
      color: #8fa3b8;
    }
    .state-sub {
      font-size: 11px;
      color: #a8bad0;
      max-width: 220px;
      line-height: 1.6;
    }
    .state-err-title {
      font-size: 12px;
      font-weight: 700;
      color: #dc2626;
    }
    .state-err-body {
      font-size: 10px;
      color: #8fa3b8;
      text-align: left;
      white-space: pre-wrap;
      max-width: 100%;
      max-height: 280px;
      overflow-y: auto;
      line-height: 1.55;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 2px solid #dce6ef;
      border-top-color: #22d8d2;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── No data note ──────────────────────────────────── */
    .no-data {
      font-size: 10px;
      color: #a8bad0;
      text-align: center;
      padding: 12px 0;
    }

    /* ── Card hover hint ───────────────────────────────── */
    .card[data-tip] { cursor: default; }
    .card[data-tip]:hover { background: #f7fafc; }

    /* ── Tooltip ───────────────────────────────────────── */
    #tt {
      position: fixed;
      z-index: 9999;
      background: #1a2535;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px 13px 9px;
      font-family: 'Avenir Next', 'Avenir', -apple-system, 'Segoe UI', Helvetica, sans-serif;
      font-size: 10px;
      line-height: 1.5;
      box-shadow: 0 6px 24px rgba(0,0,0,0.32), 0 0 0 1px rgba(255,255,255,0.07);
      pointer-events: none;
      max-width: 240px;
      min-width: 200px;
      width: max-content;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.13s ease, transform 0.13s ease;
    }
    #tt.tt-vis {
      opacity: 1;
      transform: translateY(0);
    }
    .tt-title {
      font-weight: 700;
      font-size: 10.5px;
      color: #ffffff;
      margin-bottom: 7px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      letter-spacing: 0.01em;
    }
    .tt-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-top: 3px;
    }
    .tt-key { color: rgba(255,255,255,0.65); white-space: nowrap; flex-shrink: 0; }
    .tt-val { font-weight: 600; color: #ffffff; text-align: right; }
    .tt-val.tv-ok   { color: #22d8d2; }
    .tt-val.tv-warn { color: #fbbf24; }
    .tt-val.tv-bad  { color: #fb7185; }
    .tt-div {
      margin: 6px 0 4px;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.14);
    }
    .tt-formula {
      font-size: 9px;
      color: rgba(255,255,255,0.52);
      font-style: italic;
      margin-top: 1px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
<div id="app"></div>
<!-- Floating tooltip – repositioned by JS, hidden by default -->
<div id="tt" role="tooltip" aria-hidden="true"></div>

<script>
'use strict';

// ──────────────────────────────────────────────────────────
//  Config
// ──────────────────────────────────────────────────────────
const WS_NAME = '[extension] key_metrics';

const COL = {
  TEST_NAME:      'Test Name',
  PARAM_NAME:     'Param Name',
  PARAM_VALUE:    'Param Value',
  OS_PLATFORM:    'Os Platform',
  N_USERS:        '# of users',
  N_PURCHASES:    '# of purchases',
  N_SUBS:         '# of purchases (all subs)',
  REVENUE_7D:     'Revenue 7D TOTAL',
  N_USERS_FUNNEL: '# of users (funnels)',
  N_FIRST_CLICKS: '# of first clicks',
  N_FUNNEL_DONE:  '# of funnel completed',
};

const MIN_SAMPLE_SIZE = 200;
const P_SIG  = 0.05;
const P_BORD = 0.10;

// ──────────────────────────────────────────────────────────
//  State
// ──────────────────────────────────────────────────────────
let STATE = {
  status:       'empty',   // 'empty' | 'loading' | 'data' | 'error'
  selectedTest: null,
  activeTab:    0,
  data:         null,
  error:        null,
};

// ──────────────────────────────────────────────────────────
//  Render
// ──────────────────────────────────────────────────────────
function render() {
  Object.keys(_tips).forEach(k => delete _tips[k]);
  _tipSeq = 0;
  document.getElementById('app').innerHTML = buildApp();
  bindEvents();
}

function buildApp() {
  return `<div style="display:flex;flex-direction:column;height:530px;overflow:hidden;">${buildContent()}</div>`;
}

function buildContent() {
  switch (STATE.status) {
    case 'loading': return buildLoadingState();
    case 'data':    return buildDataView();
    case 'error':   return buildErrorState();
    default:        return buildEmptyState();
  }
}

// ── Empty state ──────────────────────────────────────────
function buildEmptyState() {
  return `
    <div class="hdr">
      <div class="hdr-test" style="color:rgba(255,255,255,0.3);font-weight:500;">No experiment selected</div>
    </div>
    <div class="state-screen">
      <svg class="state-icon" width="38" height="38" viewBox="0 0 38 38" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="4" y="10" width="30" height="22" rx="3"/>
        <path d="M12 4h14M16 4v6M22 4v6" stroke-linecap="round"/>
        <path d="M11 20h8M11 26h16" stroke-linecap="round"/>
      </svg>
      <div class="state-title">No experiment selected</div>
      <div class="state-sub">Click a bar on the Timeline Tracking chart to load metrics here</div>
    </div>`;
}

// ── Loading state ────────────────────────────────────────
function buildLoadingState() {
  return `
    <div class="hdr">
      <div class="hdr-test">${escHtml(STATE.selectedTest || 'Loading…')}</div>
    </div>
    <div class="state-screen">
      <div class="spinner"></div>
      <div class="state-title">Loading metrics</div>
      <div class="state-sub">${escHtml(STATE.selectedTest || '')}</div>
    </div>`;
}

// ── Error state ──────────────────────────────────────────
function buildErrorState() {
  return `
    <div class="hdr">
      <div class="hdr-test" style="color:rgba(255,255,255,0.4);">Error</div>
    </div>
    <div class="state-screen">
      <svg class="state-icon" width="34" height="34" viewBox="0 0 34 34" fill="none" stroke="#dc2626" stroke-width="1.5">
        <circle cx="17" cy="17" r="14"/>
        <path d="M17 10v8M17 24v1" stroke-linecap="round"/>
      </svg>
      <div class="state-err-title">Could not load data</div>
      <div class="state-err-body">${escHtml(STATE.error || 'Unknown error')}</div>
    </div>`;
}

// ── Data view ────────────────────────────────────────────
function buildDataView() {
  const d = STATE.data;
  if (!d) return buildEmptyState();

  const paramNames = d.paramNames;
  const activeTab  = Math.min(STATE.activeTab, paramNames.length - 1);
  const currentPN  = paramNames[activeTab];
  const variants   = d.variants[currentPN] || [];
  const platforms  = d.platforms;
  const hasWeb     = [...platforms].some(p => p?.toLowerCase() === 'web');

  const controls = variants.filter(v => v.isControl);
  const testVars = variants.filter(v => !v.isControl);
  const ctrl     = controls[0] || null;

  const minN      = variants.reduce((m, v) => Math.min(m, v.users || Infinity), Infinity);
  const lowSample = isFinite(minN) && minN < MIN_SAMPLE_SIZE;

  // Header chips
  const chipHtml = [...platforms].filter(Boolean).map(p => {
    const k   = p.toLowerCase();
    const cls = k === 'ios' ? 'chip-ios' : k === 'android' ? 'chip-android' : k === 'web' ? 'chip-web' : 'chip-all';
    return `<span class="hdr-chip ${cls}">${escHtml(p)}</span>`;
  }).join('') || `<span class="hdr-chip chip-all">All</span>`;

  // Variant names for header
  const ctrlName = ctrl?.paramValue || '—';
  const testName = testVars[0]?.paramValue || '—';
  const variantLine = testVars.length > 0
    ? `<span class="ctrl">${escHtml(ctrlName)}</span>
       <span class="arrow">→</span>
       <span class="test">${escHtml(testVars.length === 1 ? testName : testVars.length + ' variants')}</span>`
    : `<span class="ctrl">${escHtml(ctrlName)}</span>`;

  const ctrlN = ctrl ? fmtN(ctrl.users) : '—';
  const testN = testVars.length === 1 ? fmtN(testVars[0].users)
              : testVars.length > 1   ? fmtN(testVars.reduce((s, v) => s + v.users, 0))
              : '—';

  let html = `
    <div class="hdr">
      <div class="hdr-test" title="${escHtml(d.testName)}">${escHtml(d.testName)}</div>
      <div class="hdr-row">
        <div class="hdr-variants">${variantLine}</div>
        <div class="hdr-right">
          <div class="hdr-chips">${chipHtml}</div>
          <div class="hdr-n"><strong>${ctrlN}</strong> / <strong>${testN}</strong></div>
        </div>
      </div>
    </div>`;

  if (paramNames.length > 1) {
    const tabsHtml = paramNames.map((pn, i) =>
      `<div class="tab${i === activeTab ? ' active' : ''}" data-tab="${i}">${escHtml(pn)}</div>`
    ).join('');
    html += `<div class="tabs">${tabsHtml}</div>`;
  }

  html += `<div class="content">`;

  if (lowSample && isFinite(minN)) {
    html += `
      <div class="alert">
        <svg class="alert-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 2L1 14h14L8 2z" stroke-linejoin="round"/>
          <path d="M8 7v3.5M8 12.5v.5" stroke-linecap="round"/>
        </svg>
        <span>Small sample — min <strong>${minN.toLocaleString()}</strong> users per arm (need ≥${MIN_SAMPLE_SIZE})</span>
      </div>`;
  }

  if (!ctrl && testVars.length === 0) {
    html += `<div class="no-data">No variant data found</div>`;
  } else if (testVars.length === 0) {
    html += `<div class="no-data">No test variant found — only control data available</div>`;
  } else {
    testVars.forEach(tv => {
      if (testVars.length > 1) {
        html += `
          <div class="section-sep">
            <span class="section-sep-label">${escHtml(tv.paramValue)}</span>
            <div class="section-sep-line"></div>
          </div>`;
      }
      html += buildMetricCards(ctrl, tv, hasWeb);
    });
  }

  html += `</div>`;
  return html;
}

// ── Build metric cards for one ctrl/test pair ────────────
function buildMetricCards(ctrl, tv, hasWeb) {
  let html = '';
  const c = ctrl || {};

  html += metricCard('Start2Purchase', 'Conversion',
    c.start2purch, tv.start2purch, tv.pvalues?.start_to_purch, 'pct',
    makeTipData('proportion',
      { val: c.start2purch, n: c.users },
      { val: tv.start2purch, n: tv.users }
    )
  );

  html += metricCard('ARPU 7D', 'Revenue / user',
    c.arpu, tv.arpu, tv.pvalues?.arpu, 'currency',
    makeTipData('arpu',
      { val: c.arpu,  n: c.users,  arps: c.arps,  s2p: c.start2purch },
      { val: tv.arpu, n: tv.users, arps: tv.arps, s2p: tv.start2purch }
    )
  );

  html += metricCard('ARPS 7D', 'Revenue / subscriber',
    c.arps, tv.arps, tv.pvalues?.arps, 'currency',
    makeTipData('arps',
      { val: c.arps,  n: c.users, s2p: c.start2purch },
      { val: tv.arps, n: tv.users, s2p: tv.start2purch }
    )
  );

  if (hasWeb) {
    html += `
      <div class="section-sep">
        <span class="section-sep-label">Web only</span>
        <div class="section-sep-line"></div>
      </div>`;
    html += metricCard('Join → First Click', null,
      c.joinToFirstClick, tv.joinToFirstClick, tv.pvalues?.join2firstclick, 'pct',
      makeTipData('proportion',
        { val: c.joinToFirstClick,  n: c.users },
        { val: tv.joinToFirstClick, n: tv.users }
      )
    );
    html += metricCard('Join → Funnel Complete', null,
      c.joinToFunnelComplete, tv.joinToFunnelComplete, tv.pvalues?.join2funnelcomplete, 'pct',
      makeTipData('proportion',
        { val: c.joinToFunnelComplete,  n: c.users },
        { val: tv.joinToFunnelComplete, n: tv.users }
      )
    );
  }

  return html;
}

function metricCard(label, sublabel, ctrlVal, testVal, pval, fmt, tipData) {
  const ctrlFmt = fmt === 'pct' ? fmtPct(ctrlVal) : fmtCurrency(ctrlVal);
  const testFmt = fmt === 'pct' ? fmtPct(testVal) : fmtCurrency(testVal);

  let delta = null;
  if (ctrlVal != null && testVal != null && ctrlVal !== 0) {
    delta = (testVal - ctrlVal) / Math.abs(ctrlVal);
  }

  const { cls: sigCls, label: sigLabel } = sigInfo(pval);
  const cardCls = sigCls === 'sig' ? 'sig' : sigCls === 'bord' ? 'bord' : 'ns';

  let deltaCls = 'delta-nil';
  if (delta !== null && sigCls === 'sig') {
    deltaCls = delta > 0.001 ? 'delta-pos' : delta < -0.001 ? 'delta-neg' : 'delta-nil';
  }

  const deltaHtml = delta === null
    ? `<span class="card-delta delta-nil">—</span>`
    : `<span class="card-delta ${deltaCls}">${delta >= 0 ? '+' : ''}${(delta * 100).toFixed(1)}%</span>`;

  let tipAttr = '';
  if (tipData) {
    const key = 'tip' + (++_tipSeq);
    _tips[key] = tipData;
    tipAttr = ` data-tip="${key}"`;
  }

  return `
    <div class="card ${cardCls}"${tipAttr}>
      <div class="card-info">
        <div class="card-name">${escHtml(label)}</div>
        <div class="card-vals">
          <span class="card-ctrl">${ctrlFmt}</span>
          <span class="card-arrow">→</span>
          <span class="card-test">${testFmt}</span>
        </div>
      </div>
      <div class="card-right">
        ${deltaHtml}
        <span class="sig-badge ${sigCls}">${sigLabel}</span>
      </div>
    </div>`;
}

function sigInfo(pval) {
  if (pval === null || pval === undefined) return { cls: 'na', label: '—' };
  const p = parseFloat(pval);
  if (isNaN(p)) return { cls: 'na', label: '—' };
  if (p < P_SIG)  return { cls: 'sig',  label: `Significant · p=${p.toFixed(3)}` };
  if (p < P_BORD) return { cls: 'bord', label: `Borderline · p=${p.toFixed(3)}` };
  return { cls: 'ns', label: `Not significant · p=${p.toFixed(2)}` };
}

// ──────────────────────────────────────────────────────────
//  Tooltip store
// ──────────────────────────────────────────────────────────
const _tips = {};
let   _tipSeq = 0;

function makeTipData(type, ctrl, test) {
  return { type, ctrl: ctrl || {}, test: test || {} };
}

function buildTipHtml(td) {
  const { type, ctrl: c, test: t } = td;
  let testName, formula, rows = '';

  if (type === 'proportion') {
    testName = 'Two-proportion z-test';
    formula  = 'SE = √(p_c·(1−p_c)/n_c + p_t·(1−p_t)/n_t)';
  } else if (type === 'arpu') {
    testName = 'ARPU z-test  (point-mass variance)';
    formula  = 'Var(ARPU) ≈ ARPS² · p · (1−p)';
  } else {
    testName = 'ARPS z-test  (CV ≈ 1)';
    formula  = 'SE = √(ARPS_c²/n_subs_c + ARPS_t²/n_subs_t)';
  }

  rows += row('α / power', '0.05 / 80%');

  let deltaStr = '—';
  if (c.val != null && t.val != null) {
    const raw = t.val - c.val;
    if (type === 'proportion') {
      deltaStr = `${raw >= 0 ? '+' : ''}${(raw * 100).toFixed(2)} pp`;
    } else {
      deltaStr = `${raw >= 0 ? '+' : '−'}$${Math.abs(raw).toFixed(3)}`;
    }
  }
  rows += row('Observed Δ', deltaStr);

  if (type === 'proportion') {
    const req = reqNProportion(c.val, t.val);
    rows += sampleRow(req, c.n, 'Required n', 'Current n');

  } else if (type === 'arpu') {
    const req = reqNArpu(c.val, t.val, c.arps, t.arps, c.s2p, t.s2p);
    rows += sampleRow(req, c.n, 'Required n', 'Current n');

  } else {
    const r = reqNArps(c.val, t.val, c.s2p, t.s2p);
    if (r) {
      const ctrlSubs = (c.n && c.s2p) ? Math.round(c.n * c.s2p) : null;
      rows += sampleRow(r.nSubs, ctrlSubs, 'Required (subs)', 'Current (subs)');
      if (r.nUsers) rows += sampleRow(r.nUsers, c.n, 'Required (users)', 'Current (users)');
    } else {
      rows += row('Required n', '—');
    }
  }

  return `
    <div class="tt-title">${escHtml(testName)}</div>
    ${rows}
    <hr class="tt-div">
    <div class="tt-formula">${escHtml(formula)}</div>`;
}

function row(k, v, cls) {
  return `<div class="tt-row"><span class="tt-key">${escHtml(k)}</span><span class="tt-val${cls ? ' '+cls : ''}">${v}</span></div>`;
}

function sampleRow(req, cur, reqLabel, curLabel) {
  if (!req) return row(reqLabel, '—') + row(curLabel, cur ? fmtN(cur) + ' / arm' : '—');
  const pct  = cur ? cur / req : 0;
  const rCls = pct >= 1 ? 'tv-ok' : pct >= 0.75 ? 'tv-warn' : 'tv-bad';
  return `<div class="tt-row"><span class="tt-key">${escHtml(reqLabel)}</span><span class="tt-val ${rCls}">${fmtN(req)} / arm</span></div>` +
         `<div class="tt-row"><span class="tt-key">${escHtml(curLabel)}</span><span class="tt-val">${cur ? fmtN(cur) + ' / arm' : '—'}</span></div>`;
}

function positionTooltip(cardEl, ttEl) {
  const cr  = cardEl.getBoundingClientRect();
  const ttH = ttEl.offsetHeight || 130;
  const ttW = ttEl.offsetWidth  || 220;
  const GAP = 7;
  let top  = cr.top - ttH - GAP;
  let left = cr.left + (cr.width - ttW) / 2;
  if (top < 4) top = cr.bottom + GAP;
  left = Math.max(4, Math.min(left, window.innerWidth  - ttW - 4));
  top  = Math.max(4, Math.min(top,  window.innerHeight - ttH - 4));
  ttEl.style.left = left + 'px';
  ttEl.style.top  = top  + 'px';
}

// ──────────────────────────────────────────────────────────
//  Event binding
// ──────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      STATE.activeTab = parseInt(tab.dataset.tab);
      render();
    });
  });

  const ttEl = document.getElementById('tt');
  document.querySelectorAll('.card[data-tip]').forEach(card => {
    card.addEventListener('mouseenter', () => {
      const td = _tips[card.dataset.tip];
      if (!td) return;
      ttEl.innerHTML = buildTipHtml(td);
      positionTooltip(card, ttEl);
      ttEl.setAttribute('aria-hidden', 'false');
      ttEl.classList.add('tt-vis');
    });
    card.addEventListener('mouseleave', () => {
      ttEl.classList.remove('tt-vis');
      ttEl.setAttribute('aria-hidden', 'true');
    });
    card.addEventListener('mousemove', () => positionTooltip(card, ttEl));
  });
}

// ──────────────────────────────────────────────────────────
//  Format helpers
// ──────────────────────────────────────────────────────────
function fmtPct(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return (v * 100).toFixed(1) + '%';
}
function fmtCurrency(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  if (v >= 1000) return '$' + (v / 1000).toFixed(1) + 'k';
  return '$' + v.toFixed(2);
}
function fmtN(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return Math.round(n).toString();
}
function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ──────────────────────────────────────────────────────────
//  Statistics
// ──────────────────────────────────────────────────────────
function normalCDF(z) {
  const a1=0.319381530, a2=-0.356563782, a3=1.781477937, a4=-1.821255978, a5=1.330274429;
  const t   = 1 / (1 + 0.2316419 * Math.abs(z));
  const poly = t*(a1+t*(a2+t*(a3+t*(a4+t*a5))));
  const pdf  = Math.exp(-z*z/2) / Math.sqrt(2*Math.PI);
  const cdf  = 1 - pdf * poly;
  return z >= 0 ? cdf : 1 - cdf;
}
function pFromZ(z) { return 2 * (1 - normalCDF(Math.abs(z))); }

// Two-proportion z-test
function zTestProp(p1, n1, p2, n2) {
  if (!p1||!p2||!n1||!n2||n1<10||n2<10) return null;
  const pp = (p1*n1 + p2*n2) / (n1+n2);
  const se = Math.sqrt(pp*(1-pp)*(1/n1+1/n2));
  if (!se) return null;
  return pFromZ((p2-p1)/se);
}

// ARPU z-test: Var(ARPU) ≈ ARPS² × p × (1−p)
function zTestArpu(arpu_c, n_c, arpu_t, n_t, s2p_c, s2p_t, arps_c, arps_t) {
  if (!n_c||!n_t||n_c<20||n_t<20) return null;
  if (!arps_c||!arps_t||!s2p_c||!s2p_t) return null;
  const var_c = arps_c*arps_c * s2p_c*(1-s2p_c);
  const var_t = arps_t*arps_t * s2p_t*(1-s2p_t);
  const se = Math.sqrt(var_c/n_c + var_t/n_t);
  if (!se) return null;
  return pFromZ((arpu_t-arpu_c)/se);
}

// ARPS z-test: CV≈1 approximation
function zTestArps(arps_c, nsubs_c, arps_t, nsubs_t) {
  if (!nsubs_c||!nsubs_t||nsubs_c<10||nsubs_t<10) return null;
  const se = Math.sqrt(arps_c*arps_c/nsubs_c + arps_t*arps_t/nsubs_t);
  if (!se) return null;
  return pFromZ((arps_t-arps_c)/se);
}

// ──────────────────────────────────────────────────────────
//  Power analysis — required n at α=0.05, 80% power
// ──────────────────────────────────────────────────────────
const _ZA = 1.960, _ZB = 0.842;
const _KP = (_ZA + _ZB) * (_ZA + _ZB); // ≈ 7.849

function reqNProportion(p_c, p_t) {
  if (p_c == null || p_t == null) return null;
  const delta = Math.abs(p_t - p_c);
  if (delta < 1e-7) return null;
  return Math.ceil(_KP * (p_c*(1-p_c) + p_t*(1-p_t)) / (delta*delta));
}

function reqNArpu(arpu_c, arpu_t, arps_c, arps_t, s2p_c, s2p_t) {
  if (arpu_c == null || arpu_t == null) return null;
  if (!arps_c || !arps_t || !s2p_c || !s2p_t) return null;
  const delta = Math.abs(arpu_t - arpu_c);
  if (delta < 1e-8) return null;
  const var_c = arps_c*arps_c * s2p_c*(1-s2p_c);
  const var_t = arps_t*arps_t * s2p_t*(1-s2p_t);
  return Math.ceil(_KP * (var_c + var_t) / (delta*delta));
}

function reqNArps(arps_c, arps_t, s2p_c, s2p_t) {
  if (arps_c == null || arps_t == null) return null;
  const delta = Math.abs(arps_t - arps_c);
  if (delta < 1e-8) return null;
  const nSubs  = Math.ceil(_KP * (arps_c*arps_c + arps_t*arps_t) / (delta*delta));
  const avgS2P = (s2p_c && s2p_t) ? (s2p_c + s2p_t) / 2 : null;
  const nUsers = avgS2P ? Math.ceil(nSubs / avgS2P) : null;
  return { nSubs, nUsers };
}

// ──────────────────────────────────────────────────────────
//  Column lookup (fieldName fallback when caption is empty)
// ──────────────────────────────────────────────────────────
function bare(s) {
  return (s || '').trim()
    .replace(/^(ATTR|AGG|MIN|MAX|SUM|COUNT|COUNTD|AVG|MEDIAN)\s*\(\s*/i, '')
    .replace(/\s*\)$/, '')
    .replace(/^\[|\]$/g, '')
    .trim();
}

function canonicalName(col) {
  const cap = bare(col.caption || '');
  if (cap) return cap;
  return bare(col.fieldName || '');
}

function buildIndex(columns) {
  const idx = {};
  columns.forEach((col, i) => {
    const name = canonicalName(col);
    if (name) idx[name] = i;
  });
  return idx;
}

function requireCols(idx, names) {
  const missing = names.filter(n => idx[n] == null);
  if (!missing.length) return;
  const available = Object.keys(idx).map(k => `"${k}"`).join(', ');
  throw new Error(`Missing columns: ${missing.map(n => `"${n}"`).join(', ')}\n\nAvailable: ${available}`);
}

// ──────────────────────────────────────────────────────────
//  Variant role
// ──────────────────────────────────────────────────────────
function isControlVariant(paramValue) {
  if (!paramValue) return false;
  const v = paramValue.toLowerCase();
  return v.includes('control') || v.includes('default') || v.includes('false') || v === 'base';
}

// ──────────────────────────────────────────────────────────
//  Row value helpers
// ──────────────────────────────────────────────────────────
function numAt(row, i) {
  if (i == null) return 0;
  const v = row[i]?.value ?? row[i]?.nativeValue;
  const n = parseFloat(String(v ?? '').replace(/[^0-9.\-]/g, ''));
  return isNaN(n) ? 0 : n;
}
function strAt(row, i) {
  if (i == null) return '';
  return String(row[i]?.value ?? row[i]?.formattedValue ?? '').trim();
}

// ──────────────────────────────────────────────────────────
//  Parse [extension] key_metrics summary data
// ──────────────────────────────────────────────────────────
function parseKeyMetrics(data) {
  const cols = data.columns;
  const rows = data.data;

  console.log('[AB Metrics] Columns (' + cols.length + '):\n' +
    cols.map((c, i) => `  [${i}] cap="${bare(c.caption)}" fn="${c.fieldName}" → "${canonicalName(c)}"`).join('\n'));

  const idx = buildIndex(cols);
  requireCols(idx, [
    COL.PARAM_VALUE, COL.TEST_NAME, COL.PARAM_NAME,
    COL.N_USERS, COL.N_PURCHASES, COL.N_SUBS, COL.REVENUE_7D,
  ]);

  const groups    = {};   // paramName → paramValue → accumulated counts
  const testNames = new Set();
  const platforms = new Set();

  for (const row of rows) {
    const testName  = strAt(row, idx[COL.TEST_NAME]);
    const paramName = strAt(row, idx[COL.PARAM_NAME]);
    const paramValue = strAt(row, idx[COL.PARAM_VALUE]);
    const os = idx[COL.OS_PLATFORM] != null ? strAt(row, idx[COL.OS_PLATFORM]) : '';

    if (!paramName || !paramValue) continue;
    if (testName) testNames.add(testName);
    if (os)       platforms.add(os);

    if (!groups[paramName]) groups[paramName] = {};
    if (!groups[paramName][paramValue]) {
      groups[paramName][paramValue] = {
        paramValue, os,
        isControl: isControlVariant(paramValue),
        n_users: 0, n_purch: 0, n_subs: 0, rev7d: 0,
        n_users_funnel: 0, n_first_clicks: 0, n_funnel_done: 0,
      };
    }
    const g = groups[paramName][paramValue];
    g.n_users += numAt(row, idx[COL.N_USERS]);
    g.n_purch += numAt(row, idx[COL.N_PURCHASES]);
    g.n_subs  += numAt(row, idx[COL.N_SUBS]);
    g.rev7d   += numAt(row, idx[COL.REVENUE_7D]);
    if (idx[COL.N_USERS_FUNNEL] != null) g.n_users_funnel += numAt(row, idx[COL.N_USERS_FUNNEL]);
    if (idx[COL.N_FIRST_CLICKS] != null) g.n_first_clicks += numAt(row, idx[COL.N_FIRST_CLICKS]);
    if (idx[COL.N_FUNNEL_DONE]  != null) g.n_funnel_done  += numAt(row, idx[COL.N_FUNNEL_DONE]);
  }

  if (!Object.keys(groups).length) return null;

  const displayName = testNames.size > 0 ? [...testNames].join(', ') : 'Selected Test';
  const paramNames  = Object.keys(groups);
  const result      = { testName: displayName, platforms, paramNames, variants: {} };

  for (const [pn, variantMap] of Object.entries(groups)) {
    const variants = Object.values(variantMap).map(g => {
      const s2p  = g.n_users > 0 ? g.n_purch / g.n_users : 0;
      const arpu = g.n_users > 0 ? g.rev7d   / g.n_users : 0;
      const arps = g.n_subs  > 0 ? g.rev7d   / g.n_subs  : 0;
      const joinToFirstClick     = g.n_users_funnel > 0 ? g.n_first_clicks / g.n_users_funnel : null;
      const joinToFunnelComplete = g.n_users_funnel > 0 ? g.n_funnel_done  / g.n_users_funnel : null;
      return {
        paramValue: g.paramValue,
        os: g.os,
        isControl: g.isControl,
        users: g.n_users,
        start2purch: s2p  || null,
        arps:        arps || null,
        arpu:        arpu || null,
        joinToFirstClick,
        joinToFunnelComplete,
        _nSubs: g.n_subs,
        _nUsersFunnel: g.n_users_funnel,
        pvalues: {},
      };
    });

    // Z-tests: ctrl vs each test variant
    const ctrl = variants.find(v => v.isControl);
    if (ctrl) {
      for (const tv of variants) {
        if (tv.isControl) continue;

        tv.pvalues.start_to_purch = zTestProp(
          ctrl.start2purch, ctrl.users, tv.start2purch, tv.users
        );
        tv.pvalues.arpu = zTestArpu(
          ctrl.arpu, ctrl.users, tv.arpu, tv.users,
          ctrl.start2purch, tv.start2purch, ctrl.arps, tv.arps
        );
        tv.pvalues.arps = zTestArps(
          ctrl.arps, ctrl._nSubs, tv.arps, tv._nSubs
        );
        if (ctrl.joinToFirstClick != null && tv.joinToFirstClick != null)
          tv.pvalues.join2firstclick = zTestProp(
            ctrl.joinToFirstClick, ctrl._nUsersFunnel,
            tv.joinToFirstClick,   tv._nUsersFunnel
          );
        if (ctrl.joinToFunnelComplete != null && tv.joinToFunnelComplete != null)
          tv.pvalues.join2funnelcomplete = zTestProp(
            ctrl.joinToFunnelComplete, ctrl._nUsersFunnel,
            tv.joinToFunnelComplete,   tv._nUsersFunnel
          );
      }
    }

    result.variants[pn] = variants.sort((a, b) => a.isControl ? -1 : 1);
  }

  return result;
}

// ──────────────────────────────────────────────────────────
//  Data load
// ──────────────────────────────────────────────────────────
let _loading = false;

async function loadData() {
  if (_loading) return;
  _loading = true;
  STATE.status = 'loading';
  render();

  try {
    const dash = tableau.extensions.dashboardContent.dashboard;
    const ws   = dash.worksheets.find(w => w.name === WS_NAME);

    if (!ws) {
      const names = dash.worksheets.map(w => w.name).join(', ');
      throw new Error(`Sheet "${WS_NAME}" not found.\nAvailable: ${names}`);
    }

    const data = await ws.getSummaryDataAsync({
      maxRows:          0,
      ignoreAliases:    true,   // avoids empty-caption quirk
      ignoreSelection:  false,  // respect Timeline Tracking action filter
      includeAllColumns: true,
    });

    if (!data || data.data.length === 0) {
      STATE.status       = 'empty';
      STATE.selectedTest = null;
      STATE.data         = null;
      render();
      return;
    }

    const result = parseKeyMetrics(data);

    if (!result || !result.paramNames.length) {
      STATE.status = 'empty';
      STATE.data   = null;
    } else {
      STATE.status       = 'data';
      STATE.selectedTest = result.testName;
      STATE.activeTab    = 0;
      STATE.data         = result;
    }

  } catch (err) {
    console.error('[AB Metrics]', err);
    STATE.status = 'error';
    STATE.error  = err.message || String(err);
  }

  _loading = false;
  render();
}

// ──────────────────────────────────────────────────────────
//  Boot
// ──────────────────────────────────────────────────────────
render();

function init() {
  const dashboard = tableau.extensions.dashboardContent.dashboard;
  console.log('[AB Metrics] Worksheets:', dashboard.worksheets.map(w => w.name).join(', '));

  dashboard.worksheets.forEach(ws => {
    ws.addEventListener(tableau.TableauEventType.FilterChanged,        () => { if (!_loading) loadData(); });
    ws.addEventListener(tableau.TableauEventType.MarkSelectionChanged, () => { if (!_loading) loadData(); });
  });

  loadData();
}

function startExtension() {
  tableau.extensions.initializeAsync().then(() => {
    init();
  }).catch(err => {
    console.error('[AB Metrics] initializeAsync failed:', err);
    STATE.status = 'error';
    STATE.error  = 'Initialization failed: ' + (err?.message || err);
    render();
  });
}

if (typeof tableau !== 'undefined' && tableau.extensions) {
  startExtension();
} else {
  window.addEventListener('load', () => {
    if (typeof tableau !== 'undefined' && tableau.extensions) {
      startExtension();
    } else {
      STATE.status = 'error';
      STATE.error  = 'Tableau Extensions API not loaded.\nEnsure tableau.extensions.1.latest.js is in the same folder as index.html.';
      render();
    }
  });
}
</script>
