<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB Metrics</title>
<script src="tableau.extensions.1.latest.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 400px; height: 530px; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
  font-size: 12px; color: #1A1A2E; background: #fff;
}
.state { display: none; width: 100%; height: 100%; }
.state.active { display: flex; flex-direction: column; }

#st-loading { align-items: center; justify-content: center; background: #fff; gap: 10px; flex-direction: column; }
.spinner { width: 28px; height: 28px; border: 2.5px solid #E8E6F0; border-top-color: #D4920A; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 11px; color: #AAA; }

#st-empty { align-items: center; justify-content: center; flex-direction: column; gap: 10px; background: #FAFAFA; }
.empty-arrow { font-size: 22px; color: #CCCCDD; }
.empty-title { font-size: 12px; font-weight: 600; color: #BBBBCC; }
.empty-sub { font-size: 10.5px; color: #CCCCDD; text-align: center; line-height: 1.5; }

#st-error { align-items: center; justify-content: center; flex-direction: column; gap: 8px; padding: 20px; }
.error-icon { font-size: 20px; }
.error-title { font-size: 12px; font-weight: 600; color: #C0392B; }
.error-body { font-size: 10px; color: #888; text-align: left; white-space: pre-wrap; line-height: 1.5; max-height: 380px; overflow-y: auto; width: 100%; }
.btn-retry { margin-top: 6px; padding: 5px 14px; border: 1px solid #D4920A; border-radius: 4px; background: none; color: #D4920A; font-size: 11px; font-weight: 600; cursor: pointer; }
.btn-retry:hover { background: #FFF8EC; }

#st-main { overflow: hidden; }
.hdr { background: #1A1A2E; padding: 11px 14px 9px; flex-shrink: 0; }
.hdr-test { font-size: 12.5px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hdr-meta { display: flex; gap: 12px; margin-top: 4px; }
.hdr-group { display: flex; align-items: center; gap: 4px; font-size: 10px; color: rgba(255,255,255,.55); }
.hdr-group strong { color: rgba(255,255,255,.85); }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-ctrl { background: rgba(255,255,255,.5); }
.dot-test { background: #D4920A; }
.hdr-platforms { font-size: 9.5px; color: rgba(255,255,255,.35); margin-top: 3px; }

.cards-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 10px 6px; display: flex; flex-direction: column; gap: 6px; }
.cards-area::-webkit-scrollbar { width: 4px; }
.cards-area::-webkit-scrollbar-thumb { background: #E0E0EC; border-radius: 2px; }

.section-lbl { font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: #BBBBCC; padding: 2px 2px 0; }

.card { background: #F7F7FA; border: 1px solid #E8E8F0; border-radius: 5px; padding: 7px 10px 8px; display: grid; grid-template-columns: 108px 1fr 56px; gap: 0 8px; align-items: center; }
.card-name { font-size: 11px; font-weight: 600; color: #2D2D3A; line-height: 1.2; }
.card-type { font-size: 9px; color: #AAAABC; margin-top: 1px; }
.card-bars { display: flex; flex-direction: column; gap: 4px; }
.bar-row { display: flex; align-items: center; gap: 5px; }
.bar-lbl { font-size: 9px; font-weight: 700; width: 22px; text-align: right; flex-shrink: 0; }
.bar-lbl.ctrl { color: #3C3F4A; }
.bar-lbl.test { color: #C88800; }
.bar-track { flex: 1; height: 5px; background: #E0E0EA; border-radius: 2px; overflow: hidden; min-width: 0; }
.bar-fill { height: 100%; border-radius: 2px; transition: width .35s ease; }
.bar-fill.ctrl-fill { background: #3C3F4A; }
.bar-fill.test-fill { background: #D4920A; }
.bar-val { font-size: 9.5px; font-weight: 600; font-variant-numeric: tabular-nums; width: 44px; text-align: right; flex-shrink: 0; }
.bar-val.ctrl { color: #3C3F4A; }
.bar-val.test { color: #B87800; }
.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.delta { font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; }
.delta.pos { color: #1A7035; }
.delta.neg { color: #C0392B; }
.delta.neu { color: #AAAAAA; }
.sig-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
.sig-badge.sig95  { background: #D4EDD9; color: #1A7035; }
.sig-badge.sig90  { background: #FFF3D4; color: #A06000; }
.sig-badge.notsig { background: #EFEFEF; color: #AAAAAA; }
.sig-badge.insuf  { background: #F5F0FF; color: #9080C8; font-size: 8.5px; }

.footer { border-top: 1px solid #EEEEF4; background: #FAFAFA; padding: 5px 12px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.footer-note { font-size: 9px; color: #CCCCDD; }
.footer-legend { display: flex; gap: 6px; align-items: center; }
.leg { font-size: 8.5px; padding: 1.5px 6px; border-radius: 8px; font-weight: 700; }
.leg.g  { background: #D4EDD9; color: #1A7035; }
.leg.a  { background: #FFF3D4; color: #A06000; }
.leg.gr { background: #EFEFEF; color: #AAAAAA; }
</style>
</head>
<body>

<div id="st-loading" class="state active">
  <div class="spinner"></div>
  <div class="loading-text">Connecting…</div>
</div>

<div id="st-empty" class="state">
  <div class="empty-arrow">↖</div>
  <div class="empty-title">No test selected</div>
  <div class="empty-sub">Click a test on the<br>Timeline Tracking chart</div>
</div>

<div id="st-error" class="state">
  <div class="error-icon">⚠</div>
  <div class="error-title">Could not load data</div>
  <div id="error-msg" class="error-body"></div>
  <button class="btn-retry" onclick="loadData()">Retry</button>
</div>

<div id="st-main" class="state">
  <div class="hdr">
    <div class="hdr-test" id="hdr-test">—</div>
    <div class="hdr-meta">
      <div class="hdr-group"><span class="dot dot-ctrl"></span>Control <strong id="hdr-n-ctrl">—</strong></div>
      <div class="hdr-group"><span class="dot dot-test"></span>Test <strong id="hdr-n-test">—</strong></div>
    </div>
    <div class="hdr-platforms" id="hdr-platforms"></div>
  </div>
  <div class="cards-area" id="cards-area"></div>
  <div class="footer">
    <div class="footer-note">two-sided · 95% CI</div>
    <div class="footer-legend">
      <span class="leg g">95% sig</span>
      <span class="leg a">90% sig</span>
      <span class="leg gr">n.s.</span>
    </div>
  </div>
</div>

<script>
'use strict';

/* ─────────────────────────────────────────────────────────────────
   CONFIG
   ───────────────────────────────────────────────────────────────── */
const WS_NAME = '[extension] key_metrics';

// Exact captions as defined in the sheet (Tableau may prefix with AGG())
const COL = {
  TEST_NAME:      'Test Name',
  PARAM_NAME:     'Param Name',
  PARAM_VALUE:    'Param Value',
  OS_PLATFORM:    'Os Platform',
  N_USERS:        '# of users',
  N_PURCHASES:    '# of purchases',
  N_SUBS:         '# of purchases (all subs)',
  REVENUE_7D:     'Revenue 7D TOTAL',
  N_USERS_FUNNEL: '# of users (funnels)',
  N_FIRST_CLICKS: '# of first clicks',
  N_FUNNEL_DONE:  '# of funnel completed',
};

/* ─────────────────────────────────────────────────────────────────
   STATE
   ───────────────────────────────────────────────────────────────── */
function showState(id) {
  document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  showState('st-error');
}

/* ─────────────────────────────────────────────────────────────────
   FORMATTERS
   ───────────────────────────────────────────────────────────────── */
function fmtN(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return Math.round(n).toString();
}
function fmtPct(v, d = 2) {
  if (v == null || isNaN(v)) return '—';
  return (v * 100).toFixed(d) + '%';
}
function fmtMoney(v) {
  if (v == null || isNaN(v)) return '—';
  return v >= 1 ? '$' + v.toFixed(2) : '$' + v.toFixed(3);
}
function fmtDelta(v) {
  if (v == null || isNaN(v) || !isFinite(v)) return '—';
  return (v >= 0 ? '+' : '') + (v * 100).toFixed(1) + '%';
}
function deltaClass(v) {
  if (v == null || isNaN(v)) return 'neu';
  return v > 0.0005 ? 'pos' : v < -0.0005 ? 'neg' : 'neu';
}

/* ─────────────────────────────────────────────────────────────────
   STATISTICS
   ───────────────────────────────────────────────────────────────── */
const Stats = {
  normalCDF(z) {
    const a1=0.254829592, a2=-0.284496736, a3=1.421413741,
          a4=-1.453152027, a5=1.061405429, p=0.3275911;
    const sign = z < 0 ? -1 : 1, x = Math.abs(z) / Math.SQRT2;
    const t = 1 / (1 + p * x);
    const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
    return 0.5 * (1 + sign * y);
  },
  pFromZ(z) { return 2 * (1 - this.normalCDF(Math.abs(z))); },

  // Two-proportion z-test (Start2Purch, Join→Click, Join→Funnel)
  propTest(n_conv_c, n_c, n_conv_t, n_t) {
    if (!n_c || !n_t || n_c < 20 || n_t < 20) return null;
    const p_c = n_conv_c / n_c, p_t = n_conv_t / n_t;
    const p_pool = (n_conv_c + n_conv_t) / (n_c + n_t);
    const se = Math.sqrt(p_pool * (1 - p_pool) * (1/n_c + 1/n_t));
    if (!se) return null;
    const z = (p_t - p_c) / se;
    return { pValue: this.pFromZ(z), delta: p_c > 0 ? (p_t - p_c) / p_c : null };
  },

  // ARPU — delta method: Var(ARPU) ≈ ARPS² × p × (1-p)
  arpuTest(arpu_c, arpu_t, n_c, n_t, s2p_c, s2p_t, arps_c, arps_t) {
    if (!n_c || !n_t || n_c < 20 || n_t < 20) return null;
    if (!arps_c || !arps_t || !s2p_c || !s2p_t) return null;
    const var_c = arps_c * arps_c * s2p_c * (1 - s2p_c);
    const var_t = arps_t * arps_t * s2p_t * (1 - s2p_t);
    const se = Math.sqrt(var_c / n_c + var_t / n_t);
    if (!se) return null;
    const z = (arpu_t - arpu_c) / se;
    return { pValue: this.pFromZ(z), delta: arpu_c > 0 ? (arpu_t - arpu_c) / arpu_c : null };
  },

  // ARPS — CV = 1 approximation
  arpsTest(arps_c, arps_t, n_subs_c, n_subs_t) {
    if (!n_subs_c || !n_subs_t || n_subs_c < 10 || n_subs_t < 10) return { lowN: true };
    const se = Math.sqrt(arps_c * arps_c / n_subs_c + arps_t * arps_t / n_subs_t);
    if (!se) return null;
    const z = (arps_t - arps_c) / se;
    return { pValue: this.pFromZ(z), delta: arps_c > 0 ? (arps_t - arps_c) / arps_c : null };
  },

  sigLevel(pValue) {
    if (pValue == null) return 0;
    if (pValue < 0.05) return 95;
    if (pValue < 0.10) return 90;
    return 0;
  },
};

/* ─────────────────────────────────────────────────────────────────
   COLUMN LOOKUP
   Tableau may wrap measures in AGG(...) and sometimes returns an
   empty caption — fall back to fieldName in that case.
   ───────────────────────────────────────────────────────────────── */
function bare(s) {
  return (s || '').trim()
    .replace(/^(ATTR|AGG|MIN|MAX|SUM|COUNT|COUNTD|AVG|MEDIAN)\s*\(\s*/i, '')
    .replace(/\s*\)$/, '')
    .replace(/^\[|\]$/g, '')
    .trim();
}

function canonicalName(col) {
  const cap = bare(col.caption || '');
  if (cap) return cap;
  // caption is empty → use fieldName (strip brackets / function wrappers)
  return bare(col.fieldName || '');
}

function buildIndex(columns) {
  const idx = {};
  columns.forEach((col, i) => {
    const name = canonicalName(col);
    if (name) idx[name] = i;
  });
  return idx;
}

function requireCols(idx, names) {
  const missing = names.filter(n => idx[n] == null);
  if (!missing.length) return;
  const available = Object.keys(idx).map(k => `  "${k}"`).join('\n');
  throw new Error(
    `Missing columns: ${missing.map(n => `"${n}"`).join(', ')}\n\nAvailable:\n${available}`
  );
}

/* ─────────────────────────────────────────────────────────────────
   VARIANT ROLE
   Mirrors the "group color" calculated field in the dashboard.
   ───────────────────────────────────────────────────────────────── */
function variantRole(paramValue) {
  const v = (paramValue || '').toLowerCase();
  if (v.includes('control') || v.includes('default') || v.includes('false')) return 'ctrl';
  if (v.includes('test') || v.includes('true') || v.includes('comparison')) return 'test';
  return null;
}

/* ─────────────────────────────────────────────────────────────────
   ROW VALUE HELPERS
   ───────────────────────────────────────────────────────────────── */
function numAt(row, i) {
  if (i == null) return 0;
  const v = row[i]?.value;
  const n = parseFloat(String(v ?? '').replace(/[^0-9.\-]/g, ''));
  return isNaN(n) ? 0 : n;
}
function strAt(row, i) {
  return i != null ? String(row[i]?.value ?? '').trim() : '';
}

/* ─────────────────────────────────────────────────────────────────
   DATA PARSING
   The sheet returns one row per (test_name × param_name × param_value
   × os_platform) with all 7 measures already aggregated by Tableau.
   We sum raw counts across platforms for the same variant, then
   derive all display metrics in JS from first principles.
   ───────────────────────────────────────────────────────────────── */
function parseData(data) {
  const cols = data.columns;
  const rows = data.data;

  console.log('[AB Metrics] Columns (' + cols.length + '):\n' +
    cols.map((c, i) => `  [${i}] cap="${bare(c.caption)}" fn="${c.fieldName}" → "${canonicalName(c)}"`).join('\n'));

  const idx = buildIndex(cols);

  requireCols(idx, [
    COL.PARAM_VALUE, COL.OS_PLATFORM, COL.TEST_NAME, COL.PARAM_NAME,
    COL.N_USERS, COL.N_PURCHASES, COL.N_SUBS, COL.REVENUE_7D,
    COL.N_USERS_FUNNEL, COL.N_FIRST_CLICKS, COL.N_FUNNEL_DONE,
  ]);

  const groups    = {};  // 'ctrl' | 'test' → aggregated counts
  const testNames = new Set();
  const paramNames = new Set();
  const platforms  = new Set();

  for (const row of rows) {
    const paramValue = strAt(row, idx[COL.PARAM_VALUE]);
    const platform   = strAt(row, idx[COL.OS_PLATFORM]);
    const testName   = strAt(row, idx[COL.TEST_NAME]);
    const paramName  = strAt(row, idx[COL.PARAM_NAME]);
    const role       = variantRole(paramValue);

    if (!role) {
      console.warn(`[AB Metrics] Unrecognised variant "${paramValue}" — skipped`);
      continue;
    }

    if (testName)  testNames.add(testName);
    if (paramName) paramNames.add(paramName);
    if (platform)  platforms.add(platform);

    if (!groups[role]) {
      groups[role] = {
        variant: paramValue,
        n_users: 0, n_purch: 0, n_subs: 0, rev7d: 0,
        n_users_funnel: 0, n_first_clicks: 0, n_funnel_done: 0,
      };
    }

    const g = groups[role];
    // Sum raw counts across all platform rows for this variant
    g.n_users        += numAt(row, idx[COL.N_USERS]);
    g.n_purch        += numAt(row, idx[COL.N_PURCHASES]);
    g.n_subs         += numAt(row, idx[COL.N_SUBS]);
    g.rev7d          += numAt(row, idx[COL.REVENUE_7D]);
    g.n_users_funnel += numAt(row, idx[COL.N_USERS_FUNNEL]);
    g.n_first_clicks += numAt(row, idx[COL.N_FIRST_CLICKS]);
    g.n_funnel_done  += numAt(row, idx[COL.N_FUNNEL_DONE]);
  }

  const ctrl = groups['ctrl'];
  const test = groups['test'];

  if (!ctrl || !test) {
    console.warn('[AB Metrics] ctrl/test not identified. Groups:', Object.keys(groups).join(', ') || '(none)');
    return null;
  }

  // Derive display metrics from raw counts
  for (const g of [ctrl, test]) {
    g.s2p  = g.n_users > 0 ? g.n_purch / g.n_users : 0;
    g.arpu = g.n_users > 0 ? g.rev7d   / g.n_users : 0;
    g.arps = g.n_subs  > 0 ? g.rev7d   / g.n_subs  : 0;
    g.cr_first_click      = g.n_users_funnel > 0 ? g.n_first_clicks / g.n_users_funnel : 0;
    g.cr_funnel_completed = g.n_users_funnel > 0 ? g.n_funnel_done  / g.n_users_funnel : 0;
  }

  const isWeb = [...platforms].some(p => p.toLowerCase().includes('web'));

  // Prefer test_name for display header, fall back to param_name
  const displayName = testNames.size > 0
    ? [...testNames].join(', ')
    : [...paramNames].join(', ');

  console.log('[AB Metrics] ctrl:', ctrl);
  console.log('[AB Metrics] test:', test);
  console.log('[AB Metrics] isWeb:', isWeb, '| platforms:', [...platforms]);

  return { ctrl, test, displayName, platforms: [...platforms], isWeb };
}

/* ─────────────────────────────────────────────────────────────────
   RENDERING
   ───────────────────────────────────────────────────────────────── */
function barWidths(a, b) {
  const max = Math.max(a || 0, b || 0, 1e-12);
  return [(a / max) * 82, (b / max) * 82];
}

function sigBadge(res) {
  if (!res) return '<span class="sig-badge notsig">—</span>';
  if (res.lowN) return '<span class="sig-badge insuf">low n</span>';
  const lvl = Stats.sigLevel(res.pValue);
  if (lvl >= 95) return '<span class="sig-badge sig95">95% ✓</span>';
  if (lvl >= 90) return '<span class="sig-badge sig90">90% ✓</span>';
  return '<span class="sig-badge notsig">n.s.</span>';
}

function card(name, type, ctrlV, testV, ctrlFmt, testFmt, res) {
  const delta = res && !res.lowN ? res.delta : null;
  const [bwC, bwT] = barWidths(ctrlV, testV);
  const dc = deltaClass(delta);
  return `
<div class="card">
  <div>
    <div class="card-name">${name}</div>
    <div class="card-type">${type}</div>
  </div>
  <div class="card-bars">
    <div class="bar-row">
      <span class="bar-lbl ctrl">Ctrl</span>
      <div class="bar-track"><div class="bar-fill ctrl-fill" style="width:${bwC.toFixed(1)}%"></div></div>
      <span class="bar-val ctrl">${ctrlFmt}</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl test">Test</span>
      <div class="bar-track"><div class="bar-fill test-fill" style="width:${bwT.toFixed(1)}%"></div></div>
      <span class="bar-val test">${testFmt}</span>
    </div>
  </div>
  <div class="card-right">
    <span class="delta ${dc}">${fmtDelta(delta)}</span>
    ${sigBadge(res)}
  </div>
</div>`;
}

function render(d) {
  const c = d.ctrl, t = d.test;

  document.getElementById('hdr-test').textContent    = d.displayName || '—';
  document.getElementById('hdr-n-ctrl').textContent  = fmtN(c.n_users) + ' users';
  document.getElementById('hdr-n-test').textContent  = fmtN(t.n_users) + ' users';
  document.getElementById('hdr-platforms').textContent =
    d.platforms.filter(Boolean).sort().join(' · ');

  // Statistical tests — all working from raw counts, no pre-computed rates
  const res_s2p  = Stats.propTest(c.n_purch, c.n_users, t.n_purch, t.n_users);
  const res_arpu = Stats.arpuTest(c.arpu, t.arpu, c.n_users, t.n_users,
                                  c.s2p, t.s2p, c.arps, t.arps);
  const res_arps = Stats.arpsTest(c.arps, t.arps, c.n_subs, t.n_subs);

  let html = '<div class="section-lbl">Main Metrics</div>';
  html += card('Start2Purchase', 'Conversion rate',
    c.s2p,  t.s2p,  fmtPct(c.s2p),    fmtPct(t.s2p),    res_s2p);
  html += card('ARPU 7D', 'Revenue / user',
    c.arpu, t.arpu, fmtMoney(c.arpu),  fmtMoney(t.arpu), res_arpu);
  html += card('ARPS 7D', 'Revenue / subscriber',
    c.arps, t.arps, fmtMoney(c.arps),  fmtMoney(t.arps), res_arps);

  if (d.isWeb) {
    const res_fc = Stats.propTest(
      c.n_first_clicks, c.n_users_funnel,
      t.n_first_clicks, t.n_users_funnel
    );
    const res_fcomp = Stats.propTest(
      c.n_funnel_done, c.n_users_funnel,
      t.n_funnel_done, t.n_users_funnel
    );

    html += '<div class="section-lbl" style="margin-top:4px">Web Funnel</div>';
    html += card('Join → First Click', 'Funnel CR',
      c.cr_first_click,      t.cr_first_click,
      fmtPct(c.cr_first_click), fmtPct(t.cr_first_click), res_fc);
    html += card('Join → Funnel Done', 'Funnel CR',
      c.cr_funnel_completed,      t.cr_funnel_completed,
      fmtPct(c.cr_funnel_completed), fmtPct(t.cr_funnel_completed), res_fcomp);
  }

  document.getElementById('cards-area').innerHTML = html;
  showState('st-main');
}

/* ─────────────────────────────────────────────────────────────────
   DATA LOAD
   ───────────────────────────────────────────────────────────────── */
let _loading = false;

async function loadData() {
  if (_loading) return;
  _loading = true;
  showState('st-loading');

  try {
    const dash = tableau.extensions.dashboardContent.dashboard;
    const ws   = dash.worksheets.find(w => w.name === WS_NAME);

    if (!ws) {
      const names = dash.worksheets.map(w => w.name).join('\n  ');
      throw new Error(
        `Sheet "${WS_NAME}" not found on this dashboard.\n\nSheets present:\n  ${names}`
      );
    }

    const data = await ws.getSummaryDataAsync({
      maxRows: 0,
      ignoreAliases: true,      // true = raw values; avoids empty-caption quirk
      ignoreSelection: false,   // respect Timeline Tracking action filter
      includeAllColumns: true,
    });

    if (!data || data.data.length === 0) {
      showState('st-empty');
      return;
    }

    const result = parseData(data);

    if (!result) {
      showState('st-empty');
      return;
    }

    render(result);

  } catch (err) {
    console.error('[AB Metrics]', err);
    showError(err.message || String(err));
  } finally {
    _loading = false;
  }
}

/* ─────────────────────────────────────────────────────────────────
   INIT
   ───────────────────────────────────────────────────────────────── */
window.initExtension = function () {
  const timeout = setTimeout(() => {
    if (document.getElementById('st-loading').classList.contains('active')) {
      showError('Initialization timed out.\nMake sure the extension is running inside Tableau.');
    }
  }, 12000);

  tableau.extensions.initializeAsync().then(() => {
    clearTimeout(timeout);
    loadData();

    // Re-load on any filter or mark change — captures Timeline Tracking action filter
    tableau.extensions.dashboardContent.dashboard.worksheets.forEach(ws => {
      ws.addEventListener(tableau.TableauEventType.FilterChanged,
        () => { if (!_loading) loadData(); });
      ws.addEventListener(tableau.TableauEventType.MarkSelectionChanged,
        () => { if (!_loading) loadData(); });
    });

  }).catch(err => {
    clearTimeout(timeout);
    showError('Init failed: ' + (err.message || err));
  });
};

if (typeof tableau !== 'undefined' && tableau.extensions) {
  window.initExtension();
} else {
  window.addEventListener('load', () => {
    if (typeof tableau !== 'undefined') window.initExtension();
    else showError(
      'Tableau Extensions API not loaded.\n' +
      'Ensure tableau.extensions.1.latest.js is in the same folder as index.html.'
    );
  });
}
</script>
