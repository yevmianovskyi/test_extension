<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AB Test Quick Metrics</title>
  <!-- Tableau Extensions API
       Online/Cloud: loaded from CDN (works in any browser)
       Desktop:      falls back to the local file in the same folder     -->
  <script src="https://extensionsgallery.tableau.com/resources/tableau.extensions.1.latest.js"
          onerror="(function(){var s=document.createElement('script');s.src='tableau.extensions.1.latest.js';document.head.appendChild(s);})()">
  </script>
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ──────────────────────────────────────────── */
    html, body {
      width: 350px;
      height: 530px;
      overflow: hidden;
      background: #f0f4f8;
      color: #1a2535;
      font-family: 'Avenir Next', 'Avenir', -apple-system, 'Segoe UI', Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 530px;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────── */
    /* Dark navy pulled from the dashboard palette */
    .hdr {
      background: #162032;
      padding: 11px 14px 10px;
      flex-shrink: 0;
    }
    .hdr-test {
      font-size: 12px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }
    .hdr-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .hdr-variants {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hdr-variants .ctrl { color: rgba(255,255,255,0.55); font-weight: 600; }
    .hdr-variants .arrow { color: rgba(255,255,255,0.25); }
    .hdr-variants .test { color: #22d8d2; font-weight: 600; }
    .hdr-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hdr-chips { display: flex; gap: 3px; }
    .hdr-chip {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 3px;
    }
    .chip-ios     { background: rgba(59,130,246,0.2);  color: #93c5fd; }
    .chip-android { background: rgba(74,222,128,0.2);  color: #86efac; }
    .chip-web     { background: rgba(251,146,60,0.2);  color: #fdba74; }
    .chip-all     { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .hdr-n {
      font-size: 9.5px;
      color: rgba(255,255,255,0.35);
    }
    .hdr-n strong { color: rgba(255,255,255,0.6); font-weight: 600; }

    /* ── Tabs (multiple param names) ───────────────────── */
    .tabs {
      display: flex;
      background: #1e2e44;
      padding: 0 14px;
      overflow-x: auto;
      flex-shrink: 0;
      border-bottom: 1px solid #253548;
    }
    .tabs::-webkit-scrollbar { height: 0; }
    .tab {
      padding: 6px 10px 5px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      letter-spacing: 0.01em;
      transition: color 0.12s;
      user-select: none;
    }
    .tab:hover { color: rgba(255,255,255,0.65); }
    .tab.active { color: #22d8d2; border-bottom-color: #22d8d2; }

    /* ── Scrollable content ────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: #c8d4e0; border-radius: 2px; }

    /* ── Section divider ───────────────────────────────── */
    .section-sep {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 0 2px;
    }
    .section-sep-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8fa3b8;
      white-space: nowrap;
    }
    .section-sep-line {
      flex: 1;
      height: 1px;
      background: #dce6ef;
    }

    /* ── Alert ─────────────────────────────────────────── */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 6px 9px;
      border-radius: 5px;
      background: #fff8ec;
      border: 1px solid #f5d98a;
      font-size: 10px;
      color: #92600a;
      line-height: 1.45;
    }
    .alert-icon { flex-shrink: 0; margin-top: 1px; }

    /* ── Metric Card ───────────────────────────────────── */
    .card {
      background: #ffffff;
      border: 1px solid #dce6ef;
      border-radius: 7px;
      padding: 9px 11px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.12s;
    }
    /* Left accent stripe by significance */
    .card.sig  { border-left: 3px solid #22d8d2; }
    .card.bord { border-left: 3px solid #f59e0b; }
    .card.ns   { border-left: 3px solid #94a3b8; }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 11px;
      font-weight: 700;
      color: #1a2535;
      letter-spacing: 0.01em;
    }
    .card-vals {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
    }
    .card-ctrl {
      font-size: 10px;
      color: #8fa3b8;
      font-variant-numeric: tabular-nums;
    }
    .card-arrow {
      font-size: 9px;
      color: #c4d0dc;
    }
    .card-test {
      font-size: 10px;
      font-weight: 600;
      color: #1a2535;
      font-variant-numeric: tabular-nums;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .card-delta {
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }
    .delta-pos { color: #2a7a72; }   /* muted teal — only used when significant */
    .delta-neg { color: #b85c58; }   /* muted brick red — only used when significant */
    .delta-nil { color: #64748b; }

    .sig-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .sig-badge.sig  { background: #e0faf8; color: #0c8c85; }
    .sig-badge.bord { background: #fef3c7; color: #92600a; }
    .sig-badge.ns   { background: #e2e8f0; color: #475569; }
    .sig-badge.na   { background: #edf2f7; color: #b0bec8; }

    /* ── Empty / Loading / Error ───────────────────────── */
    .state-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 28px 24px;
      text-align: center;
    }
    .state-icon { color: #c4d0dc; }
    .state-title {
      font-size: 13px;
      font-weight: 700;
      color: #8fa3b8;
    }
    .state-sub {
      font-size: 11px;
      color: #a8bad0;
      max-width: 220px;
      line-height: 1.6;
    }
    .state-err-title {
      font-size: 12px;
      font-weight: 700;
      color: #dc2626;
    }
    .state-err-body {
      font-size: 10px;
      color: #8fa3b8;
      text-align: left;
      white-space: pre-wrap;
      max-width: 100%;
      max-height: 280px;
      overflow-y: auto;
      line-height: 1.55;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 2px solid #dce6ef;
      border-top-color: #22d8d2;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── No data note ──────────────────────────────────── */
    .no-data {
      font-size: 10px;
      color: #a8bad0;
      text-align: center;
      padding: 12px 0;
    }

    /* ── Card hover hint ───────────────────────────────── */
    .card[data-tip] { cursor: default; }
    .card[data-tip]:hover { background: #f7fafc; }

    /* ── Tooltip ───────────────────────────────────────── */
    #tt {
      position: fixed;
      z-index: 9999;
      background: #1a2535;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px 13px 9px;
      font-family: 'Avenir Next', 'Avenir', -apple-system, 'Segoe UI', Helvetica, sans-serif;
      font-size: 10px;
      line-height: 1.5;
      box-shadow: 0 6px 24px rgba(0,0,0,0.32), 0 0 0 1px rgba(255,255,255,0.07);
      pointer-events: none;
      max-width: 240px;
      min-width: 200px;
      width: max-content;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.13s ease, transform 0.13s ease;
    }
    #tt.tt-vis {
      opacity: 1;
      transform: translateY(0);
    }
    .tt-title {
      font-weight: 700;
      font-size: 10.5px;
      color: #ffffff;
      margin-bottom: 7px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      letter-spacing: 0.01em;
    }
    .tt-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-top: 3px;
    }
    .tt-key { color: rgba(255,255,255,0.65); white-space: nowrap; flex-shrink: 0; }
    .tt-val { font-weight: 600; color: #ffffff; text-align: right; }
    .tt-val.tv-ok   { color: #22d8d2; }
    .tt-val.tv-warn { color: #fbbf24; }
    .tt-val.tv-bad  { color: #fb7185; }
    .tt-div {
      margin: 6px 0 4px;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.14);
    }
    .tt-formula {
      font-size: 9px;
      color: rgba(255,255,255,0.52);
      font-style: italic;
      margin-top: 1px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
<div id="app"></div>
<!-- Floating tooltip – repositioned by JS, hidden by default -->
<div id="tt" role="tooltip" aria-hidden="true"></div>

<script>
'use strict';

// ──────────────────────────────────────────────────────────
//  Constants
// ──────────────────────────────────────────────────────────
const TIMELINE_WS = 'Timeline Tracking';
const SPLIT_WS    = 'Split';
const MIN_SAMPLE_SIZE = 200;
const P_SIG  = 0.05;
const P_BORD = 0.10;

// ──────────────────────────────────────────────────────────
//  State
// ──────────────────────────────────────────────────────────
let STATE = {
  status:       'empty',   // 'empty' | 'loading' | 'data' | 'error'
  selectedTest: null,
  activeTab:    0,
  data:         null,
  error:        null,
};

// ──────────────────────────────────────────────────────────
//  Render
// ──────────────────────────────────────────────────────────
function render() {
  // Clear tooltip store on each render so stale keys don't linger
  Object.keys(_tips).forEach(k => delete _tips[k]);
  _tipSeq = 0;
  document.getElementById('app').innerHTML = buildApp();
  bindEvents();
}

function buildApp() {
  const content = buildContent();
  return `<div style="display:flex;flex-direction:column;height:530px;overflow:hidden;">${content}</div>`;
}

function buildContent() {
  switch (STATE.status) {
    case 'loading': return buildLoadingState();
    case 'data':    return buildDataView();
    case 'error':   return buildErrorState();
    default:        return buildEmptyState();
  }
}

// ── Empty state ──────────────────────────────────────────
function buildEmptyState() {
  return `
    <div class="hdr">
      <div class="hdr-test" style="color:rgba(255,255,255,0.3);font-weight:500;">No experiment selected</div>
    </div>
    <div class="state-screen">
      <svg class="state-icon" width="38" height="38" viewBox="0 0 38 38" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="4" y="10" width="30" height="22" rx="3"/>
        <path d="M12 4h14M16 4v6M22 4v6" stroke-linecap="round"/>
        <path d="M11 20h8M11 26h16" stroke-linecap="round"/>
      </svg>
      <div class="state-title">No experiment selected</div>
      <div class="state-sub">Click a bar on the Timeline Tracking chart to load metrics here</div>
    </div>`;
}

// ── Loading state ────────────────────────────────────────
function buildLoadingState() {
  return `
    <div class="hdr">
      <div class="hdr-test">${escHtml(STATE.selectedTest || 'Loading…')}</div>
    </div>
    <div class="state-screen">
      <div class="spinner"></div>
      <div class="state-title">Loading metrics</div>
      <div class="state-sub">${escHtml(STATE.selectedTest || '')}</div>
    </div>`;
}

// ── Error state ──────────────────────────────────────────
function buildErrorState() {
  return `
    <div class="hdr">
      <div class="hdr-test" style="color:rgba(255,255,255,0.4);">Error</div>
    </div>
    <div class="state-screen">
      <svg class="state-icon" width="34" height="34" viewBox="0 0 34 34" fill="none" stroke="#dc2626" stroke-width="1.5">
        <circle cx="17" cy="17" r="14"/>
        <path d="M17 10v8M17 24v1" stroke-linecap="round"/>
      </svg>
      <div class="state-err-title">Could not load data</div>
      <div class="state-err-body">${escHtml(STATE.error || 'Unknown error')}</div>
    </div>`;
}

// ── Data view ────────────────────────────────────────────
function buildDataView() {
  const d = STATE.data;
  if (!d) return buildEmptyState();

  const paramNames = d.paramNames;
  const activeTab  = Math.min(STATE.activeTab, paramNames.length - 1);
  const currentPN  = paramNames[activeTab];
  const variants   = d.variants[currentPN] || [];
  const platforms  = d.platforms;
  const hasWeb     = [...platforms].some(p => p?.toLowerCase() === 'web');

  const controls  = variants.filter(v => v.isControl);
  const testVars  = variants.filter(v => !v.isControl);
  const ctrl      = controls[0] || null;

  const minN = variants.reduce((m, v) => Math.min(m, v.users || Infinity), Infinity);
  const lowSample = isFinite(minN) && minN < MIN_SAMPLE_SIZE;

  // Header chips
  const chipHtml = [...platforms].filter(Boolean).map(p => {
    const k = p.toLowerCase();
    const cls = k === 'ios' ? 'chip-ios' : k === 'android' ? 'chip-android' : k === 'web' ? 'chip-web' : 'chip-all';
    return `<span class="hdr-chip ${cls}">${escHtml(p)}</span>`;
  }).join('') || `<span class="hdr-chip chip-all">All</span>`;

  // Variant names for header
  const ctrlName = ctrl?.paramValue || '—';
  const testName = testVars[0]?.paramValue || '—';
  const variantLine = testVars.length > 0
    ? `<span class="ctrl">${escHtml(ctrlName)}</span>
       <span class="arrow">→</span>
       <span class="test">${escHtml(testVars.length === 1 ? testName : testVars.length + ' variants')}</span>`
    : `<span class="ctrl">${escHtml(ctrlName)}</span>`;

  // Sample size
  const ctrlN = ctrl ? fmtN(ctrl.users) : '—';
  const testN = testVars.length === 1 ? fmtN(testVars[0].users) : testVars.length > 1 ? fmtN(testVars.reduce((s,v)=>s+v.users,0)) : '—';

  let html = `
    <div class="hdr">
      <div class="hdr-test" title="${escHtml(d.testName)}">${escHtml(d.testName)}</div>
      <div class="hdr-row">
        <div class="hdr-variants">${variantLine}</div>
        <div class="hdr-right">
          <div class="hdr-chips">${chipHtml}</div>
          <div class="hdr-n"><strong>${ctrlN}</strong> / <strong>${testN}</strong></div>
        </div>
      </div>
    </div>`;

  // Tabs for multiple param names
  if (paramNames.length > 1) {
    const tabsHtml = paramNames.map((pn, i) =>
      `<div class="tab${i === activeTab ? ' active' : ''}" data-tab="${i}">${escHtml(pn)}</div>`
    ).join('');
    html += `<div class="tabs">${tabsHtml}</div>`;
  }

  html += `<div class="content">`;

  // Alert
  if (lowSample && isFinite(minN)) {
    html += `
      <div class="alert">
        <svg class="alert-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 2L1 14h14L8 2z" stroke-linejoin="round"/>
          <path d="M8 7v3.5M8 12.5v.5" stroke-linecap="round"/>
        </svg>
        <span>Small sample — min <strong>${minN.toLocaleString()}</strong> users per arm (need ≥${MIN_SAMPLE_SIZE})</span>
      </div>`;
  }

  if (!ctrl && testVars.length === 0) {
    html += `<div class="no-data">No variant data found</div>`;
  } else if (testVars.length === 0) {
    html += `<div class="no-data">No test variant found — only control data available</div>`;
  } else {
    // Render one test variant at a time (active tab selects which variant if >1)
    const activeTestVar = testVars[Math.min(STATE.activeTab > 0 ? 0 : 0, testVars.length - 1)];

    // If multiple test variants, render all
    testVars.forEach((tv, idx) => {
      if (testVars.length > 1) {
        html += `
          <div class="section-sep">
            <span class="section-sep-label">${escHtml(tv.paramValue)}</span>
            <div class="section-sep-line"></div>
          </div>`;
      }
      html += buildMetricCards(ctrl, tv, hasWeb);
    });
  }

  html += `</div>`;
  return html;
}

// ── Build metric cards for one ctrl/test pair ────────────
function buildMetricCards(ctrl, tv, hasWeb) {
  let html = '';
  const c = ctrl || {};

  html += metricCard('Start2Purchase', 'Conversion',
    c.start2purch, tv.start2purch, tv.pvalues?.start_to_purch, 'pct',
    makeTipData('proportion',
      { val: c.start2purch,  n: c.users },
      { val: tv.start2purch, n: tv.users }
    )
  );

  html += metricCard('ARPU 7D', 'Revenue / user',
    c.arpu, tv.arpu, tv.pvalues?.arpu, 'currency',
    makeTipData('arpu',
      { val: c.arpu,  n: c.users,  arps: c.arps,  s2p: c.start2purch },
      { val: tv.arpu, n: tv.users, arps: tv.arps, s2p: tv.start2purch }
    )
  );

  html += metricCard('ARPS 7D', 'Revenue / subscriber',
    c.arps, tv.arps, tv.pvalues?.arps, 'currency',
    makeTipData('arps',
      { val: c.arps,  n: c.users,  s2p: c.start2purch },
      { val: tv.arps, n: tv.users, s2p: tv.start2purch }
    )
  );

  if (hasWeb) {
    html += `
      <div class="section-sep">
        <span class="section-sep-label">Web only</span>
        <div class="section-sep-line"></div>
      </div>`;
    html += metricCard('Join → First Click', null,
      c.joinToFirstClick, tv.joinToFirstClick, tv.pvalues?.join2firstclick, 'pct',
      makeTipData('proportion',
        { val: c.joinToFirstClick,  n: c.users },
        { val: tv.joinToFirstClick, n: tv.users }
      )
    );
    html += metricCard('Join → Funnel Complete', null,
      c.joinToFunnelComplete, tv.joinToFunnelComplete, tv.pvalues?.join2funnelcomplete, 'pct',
      makeTipData('proportion',
        { val: c.joinToFunnelComplete,  n: c.users },
        { val: tv.joinToFunnelComplete, n: tv.users }
      )
    );
  }

  return html;
}

function metricCard(label, sublabel, ctrlVal, testVal, pval, fmt, tipData) {
  const ctrlFmt = fmt === 'pct' ? fmtPct(ctrlVal) : fmtCurrency(ctrlVal);
  const testFmt = fmt === 'pct' ? fmtPct(testVal) : fmtCurrency(testVal);

  let delta = null;
  if (ctrlVal != null && testVal != null && ctrlVal !== 0) {
    delta = (testVal - ctrlVal) / Math.abs(ctrlVal);
  }

  const { cls: sigCls, label: sigLabel } = sigInfo(pval);
  const cardCls = sigCls === 'sig' ? 'sig' : sigCls === 'bord' ? 'bord' : 'ns';

  // Color the delta only when statistically significant (p < 0.05)
  let deltaCls = 'delta-nil';
  if (delta !== null && sigCls === 'sig') {
    deltaCls = delta > 0.001 ? 'delta-pos' : delta < -0.001 ? 'delta-neg' : 'delta-nil';
  }

  const deltaHtml = delta === null
    ? `<span class="card-delta delta-nil">—</span>`
    : `<span class="card-delta ${deltaCls}">${delta >= 0 ? '+' : ''}${(delta * 100).toFixed(1)}%</span>`;

  // Register tooltip if data was provided
  let tipAttr = '';
  if (tipData) {
    const key = 'tip' + (++_tipSeq);
    _tips[key] = tipData;
    tipAttr = ` data-tip="${key}"`;
  }

  return `
    <div class="card ${cardCls}"${tipAttr}>
      <div class="card-info">
        <div class="card-name">${escHtml(label)}</div>
        <div class="card-vals">
          <span class="card-ctrl">${ctrlFmt}</span>
          <span class="card-arrow">→</span>
          <span class="card-test">${testFmt}</span>
        </div>
      </div>
      <div class="card-right">
        ${deltaHtml}
        <span class="sig-badge ${sigCls}">${sigLabel}</span>
      </div>
    </div>`;
}

function sigInfo(pval) {
  if (pval === null || pval === undefined) return { cls: 'na', label: '—' };
  const p = parseFloat(pval);
  if (isNaN(p)) return { cls: 'na', label: '—' };
  if (p < P_SIG)  return { cls: 'sig',  label: `Significant · p=${p.toFixed(3)}` };
  if (p < P_BORD) return { cls: 'bord', label: `Borderline · p=${p.toFixed(3)}` };
  return { cls: 'ns', label: `Not significant · p=${p.toFixed(2)}` };
}

// ──────────────────────────────────────────────────────────
//  Tooltip store  (reset on each render, keyed by card id)
// ──────────────────────────────────────────────────────────
const _tips = {};
let   _tipSeq = 0;

// ctrl / test shape: { val, n, arps?, s2p? }
function makeTipData(type, ctrl, test) {
  return { type, ctrl: ctrl || {}, test: test || {} };
}

function buildTipHtml(td) {
  const { type, ctrl: c, test: t } = td;
  let testName, formula, rows = '';

  // ── Choose test metadata ────────────────────────────
  if (type === 'proportion') {
    testName = 'Two-proportion z-test';
    formula  = 'SE = √(p_c·(1−p_c)/n_c + p_t·(1−p_t)/n_t)';
  } else if (type === 'arpu') {
    testName = 'ARPU z-test  (point-mass variance)';
    formula  = 'Var(ARPU) ≈ ARPS² · p · (1−p)';
  } else {
    testName = 'ARPS z-test  (CV ≈ 1)';
    formula  = 'SE = √(ARPS_c²/n_subs_c + ARPS_t²/n_subs_t)';
  }

  // ── Alpha / power row ───────────────────────────────
  rows += row('α / power', '0.05 / 80%');

  // ── Observed delta row ──────────────────────────────
  let deltaStr = '—';
  if (c.val != null && t.val != null) {
    const raw = t.val - c.val;
    if (type === 'proportion') {
      deltaStr = `${raw >= 0 ? '+' : ''}${(raw * 100).toFixed(2)} pp`;
    } else {
      deltaStr = `${raw >= 0 ? '+' : '−'}$${Math.abs(raw).toFixed(3)}`;
    }
  }
  rows += row('Observed Δ', deltaStr);

  // ── Required n ─────────────────────────────────────
  if (type === 'proportion') {
    const req = reqNProportion(c.val, t.val);
    rows += sampleRow(req, c.n, 'Required n', 'Current n');

  } else if (type === 'arpu') {
    const req = reqNArpu(c.val, t.val, c.arps, t.arps, c.s2p, t.s2p);
    rows += sampleRow(req, c.n, 'Required n', 'Current n');

  } else {
    // ARPS — show subscriber and user counts separately
    const r = reqNArps(c.val, t.val, c.s2p, t.s2p);
    if (r) {
      const ctrlSubs = (c.n && c.s2p) ? Math.round(c.n * c.s2p) : null;
      rows += sampleRow(r.nSubs, ctrlSubs, 'Required (subs)', 'Current (subs)');
      if (r.nUsers) {
        rows += sampleRow(r.nUsers, c.n, 'Required (users)', 'Current (users)');
      }
    } else {
      rows += row('Required n', '—');
    }
  }

  return `
    <div class="tt-title">${escHtml(testName)}</div>
    ${rows}
    <hr class="tt-div">
    <div class="tt-formula">${escHtml(formula)}</div>`;
}

// Helper: a key/value row
function row(k, v, cls) {
  const c = cls ? ` class="${cls}"` : '';
  return `<div class="tt-row"><span class="tt-key">${escHtml(k)}</span><span class="tt-val${cls ? ' '+cls : ''}">${v}</span></div>`;
}

// Helper: required vs current n row pair with traffic-light colouring
function sampleRow(req, cur, reqLabel, curLabel) {
  if (!req) return row(reqLabel, '—') + row(curLabel, cur ? fmtN(cur) + ' / arm' : '—');
  const pct   = cur ? cur / req : 0;
  const rCls  = pct >= 1 ? 'tv-ok' : pct >= 0.75 ? 'tv-warn' : 'tv-bad';
  const reqHtml = `<span class="tt-val ${rCls}">${fmtN(req)} / arm</span>`;
  const curHtml = `<span class="tt-val">${cur ? fmtN(cur) + ' / arm' : '—'}</span>`;
  return `<div class="tt-row"><span class="tt-key">${escHtml(reqLabel)}</span>${reqHtml}</div>` +
         `<div class="tt-row"><span class="tt-key">${escHtml(curLabel)}</span>${curHtml}</div>`;
}

// ── Tooltip positioning ──────────────────────────────────
function positionTooltip(cardEl, ttEl) {
  const cr  = cardEl.getBoundingClientRect();
  const ttH = ttEl.offsetHeight || 130;
  const ttW = ttEl.offsetWidth  || 220;
  const vpW = window.innerWidth;
  const vpH = window.innerHeight;
  const GAP = 7;

  // Prefer above the card; fall back to below if not enough room
  let top  = cr.top - ttH - GAP;
  let left = cr.left + (cr.width - ttW) / 2;
  if (top < 4) top = cr.bottom + GAP;

  // Clamp to viewport
  left = Math.max(4, Math.min(left, vpW - ttW - 4));
  top  = Math.max(4, Math.min(top,  vpH - ttH - 4));

  ttEl.style.left = left + 'px';
  ttEl.style.top  = top  + 'px';
}

// ──────────────────────────────────────────────────────────
//  Event binding
// ──────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      STATE.activeTab = parseInt(tab.dataset.tab);
      render();
    });
  });

  // ── Tooltip events ─────────────────────────────────
  const ttEl = document.getElementById('tt');
  document.querySelectorAll('.card[data-tip]').forEach(card => {
    card.addEventListener('mouseenter', () => {
      const td = _tips[card.dataset.tip];
      if (!td) return;
      ttEl.innerHTML = buildTipHtml(td);
      positionTooltip(card, ttEl);
      ttEl.setAttribute('aria-hidden', 'false');
      ttEl.classList.add('tt-vis');
    });
    card.addEventListener('mouseleave', () => {
      ttEl.classList.remove('tt-vis');
      ttEl.setAttribute('aria-hidden', 'true');
    });
    card.addEventListener('mousemove', () => positionTooltip(card, ttEl));
  });
}

// ──────────────────────────────────────────────────────────
//  Format helpers
// ──────────────────────────────────────────────────────────
function fmtPct(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return (v * 100).toFixed(1) + '%';
}
function fmtCurrency(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  if (v >= 1000) return '$' + (v / 1000).toFixed(1) + 'k';
  return '$' + v.toFixed(2);
}
function fmtN(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return Math.round(n).toString();
}
function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
// ──────────────────────────────────────────────────────────
//  (p-values come from ab_dashboard_stats — no local z-tests needed)
// ──────────────────────────────────────────────────────────

// ARPU z-test: Var(ARPU) ≈ ARPS² × p × (1−p)  (point-mass revenue model)
// ──────────────────────────────────────────────────────────
//  Power analysis — required sample size at α=0.05, 80% power
//  Formula: n = (z_α/2 + z_β)² × (σ_c² + σ_t²) / Δ²
// ──────────────────────────────────────────────────────────
const _ZA = 1.960;   // z_{α/2} for α=0.05 two-tailed
const _ZB = 0.842;   // z_β    for 80% power
const _KP = (_ZA + _ZB) * (_ZA + _ZB); // ≈ 7.849

// Two-proportion: σ² = p(1−p)
function reqNProportion(p_c, p_t) {
  if (p_c == null || p_t == null) return null;
  const delta = Math.abs(p_t - p_c);
  if (delta < 1e-7) return null;
  // unpooled: n_per_arm = K × [p_c(1−p_c) + p_t(1−p_t)] / Δ²
  return Math.ceil(_KP * (p_c*(1-p_c) + p_t*(1-p_t)) / (delta*delta));
}

// ARPU: Var(ARPU) ≈ ARPS² × p × (1−p)  (point-mass revenue model)
function reqNArpu(arpu_c, arpu_t, arps_c, arps_t, s2p_c, s2p_t) {
  if (arpu_c == null || arpu_t == null) return null;
  if (!arps_c || !arps_t || !s2p_c || !s2p_t) return null;
  const delta = Math.abs(arpu_t - arpu_c);
  if (delta < 1e-8) return null;
  const var_c = arps_c*arps_c * s2p_c*(1-s2p_c);
  const var_t = arps_t*arps_t * s2p_t*(1-s2p_t);
  return Math.ceil(_KP * (var_c + var_t) / (delta*delta));
}

// ARPS: CV≈1 → Var(ARPS) ≈ ARPS²  (per subscriber)
// Returns { nSubs, nUsers } — nUsers derived via avg conversion rate
function reqNArps(arps_c, arps_t, s2p_c, s2p_t) {
  if (arps_c == null || arps_t == null) return null;
  const delta = Math.abs(arps_t - arps_c);
  if (delta < 1e-8) return null;
  const nSubs  = Math.ceil(_KP * (arps_c*arps_c + arps_t*arps_t) / (delta*delta));
  const avgS2P = (s2p_c && s2p_t) ? (s2p_c + s2p_t) / 2 : null;
  const nUsers = avgS2P ? Math.ceil(nSubs / avgS2P) : null;
  return { nSubs, nUsers };
}

// ──────────────────────────────────────────────────────────
//  Identify control variant
// ──────────────────────────────────────────────────────────
function isControlVariant(paramValue) {
  if (!paramValue) return false;
  const v = paramValue.toLowerCase();
  return v.includes('default') || v.includes('control') || v.includes('false') || v === 'base';
}

// ──────────────────────────────────────────────────────────
//  Parse getSummaryDataAsync result
//  Indexed by both fieldName AND bare caption
// ──────────────────────────────────────────────────────────
function bareCaption(caption) {
  return (caption || '').trim().replace(/^AGG\(\s*/i, '').replace(/\s*\)$/, '').trim();
}

function parseTableRows(tableData) {
  if (!tableData || !tableData.columns || !tableData.data) return [];
  return tableData.data.map(row => {
    const obj = {};
    tableData.columns.forEach((col, i) => {
      const cell = {
        raw: row[i]?.nativeValue ?? null,
        fmt: row[i]?.formattedValue ?? '',
        val: row[i]?.value ?? null
      };
      obj[col.fieldName] = cell;
      const cap = bareCaption(col.caption || col.fieldName);
      if (cap && cap !== col.fieldName) obj[cap] = cell;
    });
    return obj;
  });
}

// ──────────────────────────────────────────────────────────
//  Build processed data model
// ──────────────────────────────────────────────────────────
// processRawData: builds variant map from Split summary data (user counts)
// and ab_dashboard_stats underlying data (metric values + pre-computed p-values).
function processRawData(testName, splitRows, statsRows) {
  const varMap = {};

  function ensureVariant(paramName, os, paramValue) {
    if (!varMap[paramName]) varMap[paramName] = {};
    const key = `${os}|${paramValue}`;
    if (!varMap[paramName][key]) {
      varMap[paramName][key] = {
        paramValue, os, isControl: isControlVariant(paramValue),
        users: 0, start2purch: null, arps: null, arpu: null,
        pvalues: {}
      };
    }
    return varMap[paramName][key];
  }

  // ── User counts from Split worksheet (filtered by action filter) ──────────
  for (const r of splitRows) {
    const pn = r['Param Name']?.val || r['Param Name']?.fmt || '';
    const pv = r['Param Value']?.val || r['Param Value']?.fmt || '';
    const os = r['Os Platform']?.val || r['Os Platform']?.fmt || '';
    if (!pn || !pv) continue;
    const v = ensureVariant(pn, os, pv);
    v.users = parseFloat(r['# of users']?.raw ?? r['# of users']?.fmt ?? 0) || 0;
  }

  // ── Metric values + p-values from ab_dashboard_stats ─────────────────────
  // Each row: (param_name, param_value, os_platform, metric, value, p_value)
  for (const r of statsRows) {
    // Column names differ slightly in joined vs raw table — try both forms
    const pn = r['Param Name']?.val || r['Param Name']?.fmt
            || r['Param Name (Ab Dashboard Stats)']?.val
            || r['Param Name (Ab Dashboard Stats)']?.fmt || '';
    const pv = r['Param Value']?.val || r['Param Value']?.fmt
            || r['Param Value (Ab Dashboard Stats)']?.val
            || r['Param Value (Ab Dashboard Stats)']?.fmt || '';
    const os = r['Os Platform']?.val || r['Os Platform']?.fmt
            || r['Os Platform (Ab Dashboard Stats)']?.val
            || r['Os Platform (Ab Dashboard Stats)']?.fmt || '';
    const metric = (r['Metric']?.val || r['Metric']?.fmt || '').toLowerCase().trim();
    const val    = parseFloat(r['Value']?.raw ?? r['Value']?.fmt ?? NaN);
    const pval   = parseFloat(r['P Value']?.raw ?? r['P Value']?.fmt ?? NaN);

    if (!pn || !pv || !metric) continue;
    const v = ensureVariant(pn, os, pv);

    if (metric === 'start_to_purch') {
      if (!isNaN(val))  v.start2purch            = val;
      if (!isNaN(pval)) v.pvalues.start_to_purch  = pval;
    } else if (metric === 'arps') {
      if (!isNaN(val))  v.arps        = val;
      if (!isNaN(pval)) v.pvalues.arps = pval;
    } else if (metric === 'arpu') {
      if (!isNaN(val))  v.arpu        = val;
      if (!isNaN(pval)) v.pvalues.arpu = pval;
    }
  }

  const platforms  = new Set();
  const paramNames = Object.keys(varMap);
  const result     = { testName, platforms, paramNames, variants: {} };

  for (const [pn, variantsByKey] of Object.entries(varMap)) {
    const byPV = {};
    for (const v of Object.values(variantsByKey)) {
      platforms.add(v.os);
      if (!byPV[v.paramValue]) {
        byPV[v.paramValue] = { ...v, pvalues: { ...v.pvalues } };
      } else {
        byPV[v.paramValue].users += v.users || 0;
        for (const k of ['start2purch', 'arps', 'arpu']) {
          if (byPV[v.paramValue][k] == null) byPV[v.paramValue][k] = v[k];
        }
        for (const k of Object.keys(v.pvalues)) {
          if (byPV[v.paramValue].pvalues[k] == null)
            byPV[v.paramValue].pvalues[k] = v.pvalues[k];
          else if (v.pvalues[k] != null && v.pvalues[k] < byPV[v.paramValue].pvalues[k])
            byPV[v.paramValue].pvalues[k] = v.pvalues[k];
        }
      }
    }
    result.variants[pn] = Object.values(byPV).sort((a, b) => a.isControl ? -1 : 1);
  }

  return result;
}

// ──────────────────────────────────────────────────────────
//  Fetch metric values + p-values from ab_dashboard_stats
//  (underlying table, filtered by the active action filter)
// ──────────────────────────────────────────────────────────
async function fetchStatsData(worksheet) {
  try {
    const tables = await worksheet.getUnderlyingTablesAsync();

    // First pass: find table by name/caption
    let target = tables.find(t =>
      (t.caption || '').toLowerCase().includes('ab_dashboard_stats') ||
      (t.id     || '').toLowerCase().includes('ab_dashboard_stats')
    );

    // Second pass: probe by column signature (metric + p_value columns)
    if (!target) {
      for (const t of tables) {
        const probe = await worksheet.getUnderlyingTableDataAsync(t.id, {
          maxRows: 1, ignoreAliases: false, ignoreSelection: false
        });
        if (!probe?.columns) continue;
        const captions = probe.columns.map(c =>
          bareCaption(c.caption || c.fieldName).toLowerCase()
        );
        if (captions.includes('metric') &&
            captions.some(c => c.includes('p value') || c === 'p_value' || c === 'p value')) {
          target = t; break;
        }
      }
    }

    if (!target) {
      console.warn('[AB ext] fetchStatsData: ab_dashboard_stats table not found');
      return [];
    }

    const data = await worksheet.getUnderlyingTableDataAsync(target.id, {
      maxRows: 50000, ignoreAliases: false, ignoreSelection: false
    });
    console.log(`[AB ext] fetchStatsData: ${data?.data?.length ?? 0} rows from "${target.caption || target.id}"`);
    return parseTableRows(data);
  } catch (e) {
    console.warn('[AB ext] fetchStatsData failed:', e);
    return [];
  }
}

// ──────────────────────────────────────────────────────────
//  Tableau API helpers
// ──────────────────────────────────────────────────────────
async function safeGetSummary(worksheet) {
  try {
    return await worksheet.getSummaryDataAsync({
      ignoreSelection: false,
      maxRows: 0,
      ignoreAliases: false,
      includeAllColumns: true
    });
  } catch (e) {
    console.warn(`getSummaryDataAsync failed for "${worksheet.name}":`, e);
    return null;
  }
}

// ──────────────────────────────────────────────────────────
//  Main data load
// ──────────────────────────────────────────────────────────
let _loading = false;
let _loadDebounce = null;

function scheduleLoad() {
  clearTimeout(_loadDebounce);
  _loadDebounce = setTimeout(() => { if (!_loading) loadData(); }, 200);
}

async function loadData() {
  if (_loading) return;
  _loading = true;

  try {
    const dash       = tableau.extensions.dashboardContent.dashboard;
    const timelineWs = dash.worksheets.find(w => w.name === TIMELINE_WS);
    const splitWs    = dash.worksheets.find(w => w.name === SPLIT_WS);

    if (!timelineWs) {
      throw new Error(`Worksheet "${TIMELINE_WS}" not found.\nAvailable: ${dash.worksheets.map(w=>w.name).join(', ')}`);
    }

    // ── Step 1: detect selected test from Timeline Tracking ──────────────
    // Timeline Tracking is a target of its own action filter, so
    // getSummaryDataAsync with ignoreSelection:false reflects the active filter.
    const timelineData = await safeGetSummary(timelineWs);
    const timelineRows = timelineData ? parseTableRows(timelineData) : [];

    console.log(`[AB ext] Timeline rows: ${timelineRows.length}`);
    if (timelineData?.columns) {
      console.log('[AB ext] Timeline columns:', timelineData.columns.map(c => `"${bareCaption(c.caption)}"`).join(', '));
    }

    // Count distinct test_name values visible in Timeline Tracking
    const testNames = new Set();
    for (const r of timelineRows) {
      const tn = r['Test Name']?.val || r['Test Name']?.fmt
              || r['test_name']?.val  || r['test_name']?.fmt || '';
      if (tn) testNames.add(tn);
    }

    console.log(`[AB ext] Distinct test names: ${[...testNames].join(', ') || '(none)'}`);

    // Exactly 1 visible → a specific test is filtered in
    if (testNames.size !== 1) {
      if (!STATE.data) {
        STATE.status = 'empty'; STATE.selectedTest = null; STATE.data = null;
      }
      _loading = false; render(); return;
    }

    const testName = [...testNames][0];

    // ── Step 2: show loading indicator ───────────────────────────────────
    STATE.selectedTest = testName;
    STATE.status = 'loading';
    STATE.activeTab = 0;
    render();

    // ── Step 3: fetch user counts (Split) + metrics (ab_dashboard_stats) ─
    // Both calls use ignoreSelection:false so they respect the active filter.
    const statsSource = splitWs || timelineWs;
    const [splitSummary, statsRows] = await Promise.all([
      splitWs ? safeGetSummary(splitWs) : Promise.resolve(null),
      fetchStatsData(statsSource)
    ]);

    const splitRows = splitSummary ? parseTableRows(splitSummary) : [];
    console.log(`[AB ext] Split rows: ${splitRows.length}, Stats rows: ${statsRows.length}`);

    const result = processRawData(testName, splitRows, statsRows);

    if (!result || result.paramNames.length === 0) {
      STATE.status = 'empty'; STATE.data = null;
    } else {
      STATE.data = result; STATE.status = 'data';
    }

  } catch (err) {
    console.error('[AB ext] loadData error:', err);
    STATE.status = 'error';
    STATE.error = err?.message || 'Unexpected error';
  }

  _loading = false;
  render();
}

// ──────────────────────────────────────────────────────────
//  Boot
// ──────────────────────────────────────────────────────────
async function init() {
  const dashboard = tableau.extensions.dashboardContent.dashboard;
  console.log('[AB ext] Worksheets:', dashboard.worksheets.map(w => w.name).join(', '));

  // Listen only to FilterChanged on Timeline Tracking.
  // The action filter (auto-clear:true) fires FilterChanged once after it settles —
  // no need for MarkSelectionChanged, which double-fires due to the auto-clear.
  const timelineWs = dashboard.worksheets.find(w => w.name === TIMELINE_WS);
  if (timelineWs) {
    timelineWs.addEventListener(tableau.TableauEventType.FilterChanged, scheduleLoad);
  } else {
    console.warn(`[AB ext] "${TIMELINE_WS}" not found — no event listener attached`);
  }

  loadData();
}

// ── Entry point ──────────────────────────────────────────
render();

function startExtension() {
  tableau.extensions.initializeAsync().then(() => {
    init();
  }).catch(err => {
    console.error('[AB ext] initializeAsync failed:', err);
    STATE.status = 'error';
    STATE.error = 'Initialization failed: ' + (err?.message || err);
    render();
  });
}

if (typeof tableau !== 'undefined' && tableau.extensions) {
  startExtension();
} else {
  window.addEventListener('load', () => {
    if (typeof tableau !== 'undefined' && tableau.extensions) {
      startExtension();
    } else {
      STATE.status = 'error';
      STATE.error = 'Tableau Extensions API not loaded.\nEnsure tableau.extensions.1.latest.js is in the same folder as index.html.';
      render();
    }
  });
}
